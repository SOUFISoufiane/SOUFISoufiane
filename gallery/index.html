<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie | Soufi Soufiane</title>
  <link rel="icon" type="image/png" href="../assets/logo_ss.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glider-js@1/glider.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header>
    <div class="header-inner wide">
      <a href="https://soufisoufiane.github.io/SOUFISoufiane/">
        <img src="../assets/logo_ss.png" alt="SS Logo">
      </a>
      <h1>Galerie</h1>
    </div>
  </header>

  <nav>
    <ul class="wide">
      <li><a href="https://soufisoufiane.github.io/SOUFISoufiane/">Accueil</a></li>
      <li><a href="../competences/">Compétences</a></li>
      <li><a href="../projets/">Projets</a></li>
      <li><a href="../gallery/" class="active">Galerie</a></li>
      <li><a href="../contact/">Contact</a></li>
    </ul>
  </nav>

  <main class="wide">
    <div class="glider-contain">
      <button class="glider-prev">❮</button>
      <div class="glider">
        <img src="../assets/gallery/Img1%20(1).jpeg" alt="Projet GEII - photo 1">
        <img src="../assets/gallery/Img1%20(2).jpeg" alt="Projet GEII - photo 2">
        <img src="../assets/gallery/Img1%20(3).jpeg" alt="Projet GEII - photo 3">
        <img src="../assets/gallery/Img1%20(4).jpeg" alt="Projet GEII - photo 4">
        <img src="../assets/gallery/Img1%20(5).jpeg" alt="Projet GEII - photo 5">
        <img src="../assets/gallery/Img1%20(6).jpeg" alt="Projet GEII - photo 6">
        <img src="../assets/gallery/Img1%20(7).jpeg" alt="Projet GEII - photo 7">
        <img src="../assets/gallery/Img1%20(8).jpeg" alt="Projet GEII - photo 8">
        <img src="../assets/gallery/Projet%20tutor%C3%A9%20PAMI.jpeg" alt="Projet tutoré PAMI">
      </div>
      <button class="glider-next">❯</button>
      <div class="glider-dots"></div>
    </div>

    <div class="modal" id="modal">
      <img id="modal-img" src="" alt="Image agrandie">
    </div>
  </main>

  <footer>
    Page conçue par Soufi Soufiane – Étudiant en BUT GEII, parcours Automatisme & Informatique Industrielle.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/glider-js@1/glider.min.js"></script>
  <script>
    new Glider(document.querySelector('.glider'), {
      slidesToShow: 1,
      slidesToScroll: 1,
      draggable: true,
      dots: '.glider-dots',
      arrows: {
        prev: '.glider-prev',
        next: '.glider-next'
      },
      responsive: [
        {
          breakpoint: 768,
          settings: {
            slidesToShow: 2,
            slidesToScroll: 1
          }
        },
        {
          breakpoint: 1024,
          settings: {
            slidesToShow: 3,
            slidesToScroll: 1
          }
        }
      ]
    });

    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    document.querySelectorAll('.glider img').forEach(img => {
      img.addEventListener('click', () => {
        modal.style.display = 'flex';
        modalImg.src = img.src;
      });
    });
    modal.addEventListener('click', () => {
      modal.style.display = 'none';
    });
  </script>
</body>
</html>
